        - "pyproject.toml"
        - "uv.lock"
        - "dpu_ib_sim.py"
        - "examples/golden.yaml"
        - "tests/test_engine_golden.py"
        - "docs/goals/dpu-ib-simulator/goal.md"
        - "docs/goals/dpu-ib-simulator/state.yaml"
      verify:
