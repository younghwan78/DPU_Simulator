version: 2

goal:
  title: "DPU IB Simulator"
  slug: "dpu-ib-simulator"
  kind: existing_plan
  tranche: "Implement the first complete local simulator slice from the supplied specification."
  status: done
  oracle:
    signal: "uv pytest plus headless sweep CSV from examples/golden.yaml."
    cadence: "after each Worker package and at final audit"
    final_proof: "Passing pytest output and successful CLI sweep command."
  intake:
    original_request: "/goal this document as the target, review it in detail, set the goal, and implement with uv and TDD."
    interpreted_outcome: "A runnable uv-managed single-file DPU IB simulator with tested golden calculations and a headless sweep path."
    input_shape: existing_plan
    audience: "local engineering user"
    authority: requested
    proof_type: test
    completion_proof: "uv run pytest passes and uv run python dpu_ib_sim.py --sweep examples/golden.yaml writes a CSV."
    likely_misfire: "Treating UI scaffolding as complete while the pure engine or F3 behavior is wrong."
    blind_spots_considered:
      - "DPU_ACLK_MHz is absent from the golden example, so rotation preload cannot be exact without an explicit input."
      - "PySide6 and matplotlib should be lazy imports so engine tests remain lightweight."
      - "The workspace is not currently a git repository, so worktree isolation is unavailable."
      - "GoalBuddy visual board could not be started because npm/npx is unavailable in this shell."
    existing_plan_facts:
      - "Single-file Python desktop program named dpu_ib_sim.py."
      - "Pure engine returns all intermediate values."
      - "YAML load/save for config."
      - "Headless --sweep mode writes CSV."
      - "GUI uses PySide6 when GUI dependencies are installed."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: unknown
  worker: unknown
  judge: unknown

visual_board:
  selected: local
  local:
    status: blocked
    url: null
    command: "npx goalbuddy board docs/goals/dpu-ib-simulator"
    reason: "GoalBuddy update check reported npm ENOENT; npx is unavailable."

active_task: null

