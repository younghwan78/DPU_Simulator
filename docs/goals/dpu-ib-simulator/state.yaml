  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Read the supplied implementation spec and map workspace/project constraints."
    inputs:
      - "C:/Users/user/Downloads/DPU_IB_implementation.md"
      - "E:/55_Codex_DPU_IB_simulator"
    constraints:
      - "Read-only."
    expected_output:
