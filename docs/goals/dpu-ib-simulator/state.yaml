        - "git status -> not a git repository"
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: default
    objective: "Choose the first safe implementation task from the spec."
    inputs:
      - "T001 receipt"
    constraints:
      - "Do not implement."
      - "Respect TDD and the F3 DPU_ACLK ambiguity."
    expected_output:
